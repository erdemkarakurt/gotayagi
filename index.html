<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>gotayagi</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* 🔥 MERKEZ KUTU (RESPONSIVE) */
    .center-box {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
      padding: 15px;
    }

    .card-ui {
      width: 100%;
      max-width: 650px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    #title {
      font-size: clamp(16px, 4vw, 22px);
      opacity: 0.75;
      margin-bottom: 12px;
    }

    #text {
      font-size: clamp(18px, 5vw, 26px);
      line-height: 1.5;

      /* 🔥 KRİTİK FIX */
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    #meta {
      margin-top: 12px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

<canvas id="space"></canvas>

<div class="center-box">
  <div class="card-ui">
    <div id="title">yükleniyor...</div>
    <div id="text">...</div>
    <div id="meta"></div>
  </div>
</div>

<script>
/* =========================
   🌌 STARFIELD (OPTIMIZED)
========================= */

const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const stars = Array.from({ length: 300 }, () => ({
  x: Math.random() * w - w / 2,
  y: Math.random() * h - h / 2,
  z: Math.random() * w
}));

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, w, h);

  ctx.save();
  ctx.translate(w / 2, h / 2);

  for (let s of stars) {
    s.z -= 2;

    if (s.z <= 0) {
      s.x = Math.random() * w - w / 2;
      s.y = Math.random() * h - h / 2;
      s.z = w;
    }

    const k = 120 / s.z;
    const x = s.x * k;
    const y = s.y * k;

    const size = Math.max(0.5, (1 - s.z / w) * 2.5);

    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  }

  ctx.restore();
  requestAnimationFrame(draw);
}

draw();

/* =========================
   📦 SAFE DATA LOADER
========================= */

async function load() {
  try {
    const res = await fetch("data.json?v=" + Date.now(), {
      cache: "no-store"
    });

    const d = await res.json();

    if (!d?.title || !d?.text) throw new Error("invalid data");

    document.title = d.title;
    document.getElementById("title").innerText = d.title;
    document.getElementById("text").innerText = d.text;
    document.getElementById("meta").innerText = `${d.topic} • ${d.date}`;

  } catch (e) {
    document.getElementById("title").innerText = "hata";
    document.getElementById("text").innerText = "veri yüklenemedi";
  }
}

load();
</script>

</body>
</html>
