<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>gotayagi</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    #text {
      font-size: 26px;
      max-width: 700px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div id="text">yükleniyor...</div>

<script>
async function load() {
  const res = await fetch("data.json?v=" + Date.now());
  const data = await res.json();
  document.getElementById("text").innerText = data.text;
}

load();
</script>

</body>
</html>
