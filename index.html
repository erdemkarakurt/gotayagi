<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  
  <title>götayağı.com</title>
  <meta property="og:title" content="götayağı.com" />
  <meta property="og:description" content="Gündelik Hayatın Absürt Manifestoları" />
  <meta property="og:image" content="https://xn--gtaya-jua50a2e.com/content/logogt1.png" />
  <meta property="og:url" content="https://xn--gtaya-jua50a2e.com" />
  <meta property="og:type" content="website" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: white;
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .center-box {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 500px;
      padding: 10px;
    }

    .card-ui {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    .brand-logo {
      width: 100%;
      max-width: 170px;
      height: auto;
      margin-bottom: 25px;
      display: inline-block;
    }

    #title {
      font-size: clamp(12px, 3.5vw, 15px);
      opacity: 0.5;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #text {
      font-size: clamp(18px, 5.8vw, 26px);
      line-height: 1.4;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 20px;
    }

    /* SESLİ OKU BUTONU */
    #btn-dinle {
      display: none; /* Veri yüklenene kadar gizli */
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 50px;
      padding: 10px 24px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 10px;
      backdrop-filter: blur(5px);
    }

    #btn-dinle:active {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(0.95);
    }

    #meta {
      margin-top: 15px;
      font-size: 10px;
      opacity: 0.3;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

<canvas id="space"></canvas>

<div class="center-box">
  <main class="card-ui">
    <img src="content/logogt1.png" alt="götayağı logo" class="brand-logo">
    
    <div id="title">yükleniyor...</div>
    <div id="text">Lütfen bekleyiniz...</div>
    
    <button id="btn-dinle" onclick="sesliOku()">🔊 SESLİ DİNLE</button>

    <div id="meta"></div>
  </main>
</div>

<script>
/* =========================
    🌌 STARFIELD (Arka Plan)
========================= */
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");
let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const stars = Array.from({ length: 200 }, () => ({
  x: Math.random() * w - w / 2,
  y: Math.random() * h - h / 2,
  z: Math.random() * w
}));

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, w, h);
  ctx.save();
  ctx.translate(w / 2, h / 2);

  for (let s of stars) {
    s.z -= 1.2;
    if (s.z <= 0) {
      s.x = Math.random() * w - w / 2;
      s.y = Math.random() * h - h / 2;
      s.z = w;
    }
    const k = 120 / s.z;
    const size = Math.max(0.1, (1 - s.z / w) * 1.8);
    ctx.beginPath();
    ctx.arc(s.x * k, s.y * k, size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  }
  ctx.restore();
  requestAnimationFrame(draw);
}
draw();

/* =========================
    📦 DATA LOADER & TTS
========================= */
async function load() {
  try {
    const res = await fetch("data.json?v=" + Date.now());
    const d = await res.json();

    document.title = "götayağı.com";
    document.getElementById("title").innerText = d.title;
    document.getElementById("text").innerText = d.text;
    document.getElementById("meta").innerText = `${d.topic.toUpperCase()} • ${d.date}`;
    
    // Veri gelince dinleme butonunu göster
    document.getElementById("btn-dinle").style.display = "inline-block";

  } catch (e) {
    document.getElementById("text").innerText = "Henüz bir nükte paylaşılmadı.";
  }
}

function sesliOku() {
  const metin = document.getElementById("text").innerText;
  const baslik = document.getElementById("title").innerText;
  const btn = document.getElementById("btn-dinle");

  // Eğer konuşuyorsa durdur
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    btn.innerText = "🔊 SESLİ DİNLE";
    return;
  }

  const mesaj = new SpeechSynthesisUtterance(baslik + ". " + metin);
  mesaj.lang = 'tr-TR';
  mesaj.rate = 0.9; // Hafif yavaş ve bilge tonu
  
  mesaj.onstart = () => { btn.innerText = "⏹ DURDUR"; };
  mesaj.onend = () => { btn.innerText = "🔊 SESLİ DİNLE"; };

  window.speechSynthesis.speak(mesaj);
}

load();
</script>

</body>
</html>
