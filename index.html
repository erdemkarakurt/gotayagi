<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>gotayagi</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      max-width: 750px;
      z-index: 2;
      padding: 20px;
      backdrop-filter: blur(3px);
    }

    #title {
      font-size: 20px;
      opacity: 0.7;
      margin-bottom: 15px;
    }

    #text {
      font-size: 28px;
      line-height: 1.6;
      text-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    #meta {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.4;
    }
  </style>
</head>

<body>

<canvas id="space"></canvas>

<div class="box">
  <div id="title">yükleniyor...</div>
  <div id="text">...</div>
  <div id="meta"></div>
</div>

<script>
/* =========================
   🌌 KARA DELİK UZAY EFEKTİ
========================= */

const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const stars = Array.from({ length: 400 }, () => ({
  x: Math.random() * w - w/2,
  y: Math.random() * h - h/2,
  z: Math.random() * w
}));

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, w, h);

  ctx.save();
  ctx.translate(w/2, h/2);

  for (let s of stars) {
    s.z -= 2;

    if (s.z <= 0) {
      s.x = Math.random() * w - w/2;
      s.y = Math.random() * h - h/2;
      s.z = w;
    }

    const k = 128 / s.z;
    const x = s.x * k;
    const y = s.y * k;

    const size = (1 - s.z / w) * 3;

    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  }

  ctx.restore();

  requestAnimationFrame(draw);
}

draw();

/* =========================
   📦 DATA LOAD
========================= */

async function load() {
  const url = "data.json?v=" + Date.now();

  const res = await fetch(url, {
    cache: "no-store",
    headers: {
      "Cache-Control": "no-cache",
      "Pragma": "no-cache"
    }
  });

  const d = await res.json();

  console.log("LOADED:", d);

  document.title = d.title;
  document.getElementById("title").innerText = d.title;
  document.getElementById("text").innerText = d.text;
  document.getElementById("meta").innerText = `${d.topic} • ${d.date}`;
}

load();
</script>

</body>
</html>
