<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>gotayagi</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 720px;
    }

    #title {
      font-size: 22px;
      opacity: 0.75;
      margin-bottom: 14px;
    }

    #text {
      font-size: 26px;
      line-height: 1.6;
      transition: opacity 0.3s ease;
    }

    #meta {
      margin-top: 16px;
      font-size: 13px;
      opacity: 0.45;
    }
  </style>
</head>

<body>

<div class="box">
  <div id="title">yükleniyor...</div>
  <div id="text">...</div>
  <div id="meta"></div>
</div>

<script>
async function loadContent() {
  const titleEl = document.getElementById("title");
  const textEl = document.getElementById("text");
  const metaEl = document.getElementById("meta");

  try {
    // 🔥 cache bypass + güvenli fetch
    const res = await fetch("data.json?v=" + Date.now(), {
      cache: "no-store"
    });

    if (!res.ok) throw new Error("HTTP error");

    const d = await res.json();

    // 🧠 safety fallback
    if (!d || !d.text) {
      throw new Error("Invalid data");
    }

    // 🎯 dynamic update
    document.title = d.title || "gotayagi";

    titleEl.innerText = d.title || "başlık yok";
    textEl.innerText = d.text || "içerik yok";
    metaEl.innerText = `${d.topic || "unknown"} • ${d.date || ""}`;

  } catch (err) {
    console.log("LOAD ERROR:", err);

    titleEl.innerText = "hata";
    textEl.innerText = "içerik yüklenemedi";
    metaEl.innerText = "";
  }
}

loadContent();
</script>

</body>
</html>
