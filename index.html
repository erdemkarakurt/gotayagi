<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>gotayagi</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 700px;
    }

    #title {
      font-size: 22px;
      opacity: 0.7;
      margin-bottom: 15px;
    }

    #text {
      font-size: 26px;
      line-height: 1.6;
    }

    #meta {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div class="box">
  <div id="title">yükleniyor...</div>
  <div id="text">...</div>
  <div id="meta"></div>
</div>

<script>
async function load() {
  try {
    const res = await fetch("data.json?v=" + Date.now());
    const d = await res.json();

    document.title = d.title;

    document.getElementById("title").innerText = d.title;
    document.getElementById("text").innerText = d.text;
    document.getElementById("meta").innerText =
      `${d.topic} • ${d.date}`;
  } catch (e) {
    document.getElementById("text").innerText = "yüklenemedi";
  }
}

load();
</script>

</body>
</html>
