<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  
  <title>götayağı.com</title>
  <meta property="og:title" content="götayağı.com" />
  <meta property="og:description" content="Gündelik Hayatın Absürt Manifestoları" />
  <meta property="og:image" content="https://xn--gtaya-jua50a2e.com/content/logogt1.png" />
  <meta property="og:url" content="https://xn--gtaya-jua50a2e.com" />
  <meta property="og:type" content="website" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * { box-sizing: border-box; } /* Taşmaları engellemek için IT kuralı */

    body {
      margin: 0;
      overflow: hidden; /* Ekranın kaymasını engeller, tek parça görünüm sağlar */
      background: black;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      height: 100dvh; /* Mobil tarayıcı barları dahil tam ekran */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .center-box {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 500px;
      padding: 10px;
    }

    .card-ui {
      width: 100%;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 25px 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* LOGO: Mobilde ekrana sığması için küçültüldü */
    .brand-logo {
      width: 100%;
      max-width: 180px; /* Mobilde taşmaması için ideal boyut */
      height: auto;
      margin-bottom: 20px;
      display: inline-block;
    }

    #title {
      font-size: clamp(12px, 3.5vw, 16px);
      opacity: 0.6;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    #text {
      /* Yazı boyutu ekrana göre otomatik ayarlanır, asla taşmaz */
      font-size: clamp(18px, 5.5vw, 24px);
      line-height: 1.4;
      font-weight: 700;
      color: #f8f9fa;
      margin-bottom: 5px;
    }

    #meta {
      margin-top: 20px;
      font-size: 10px;
      opacity: 0.4;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

<canvas id="space"></canvas>

<div class="center-box">
  <div class="card-ui">
    <img src="content/logogt1.png" alt="götayağı logo" class="brand-logo">
    
    <div id="title">yükleniyor...</div>
    <div id="text">...</div>
    <div id="meta"></div>
  </div>
</div>

<script>
/* =========================
    🌌 STARFIELD (Yıldız Alanı)
========================= */
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");
let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const stars = Array.from({ length: 250 }, () => ({
  x: Math.random() * w - w / 2,
  y: Math.random() * h - h / 2,
  z: Math.random() * w
}));

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, w, h);
  ctx.save();
  ctx.translate(w / 2, h / 2);

  for (let s of stars) {
    s.z -= 1.5;
    if (s.z <= 0) {
      s.x = Math.random() * w - w / 2;
      s.y = Math.random() * h - h / 2;
      s.z = w;
    }
    const k = 120 / s.z;
    const size = Math.max(0.1, (1 - s.z / w) * 2);
    ctx.beginPath();
    ctx.arc(s.x * k, s.y * k, size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  }
  ctx.restore();
  requestAnimationFrame(draw);
}
draw();

/* =========================
    📦 SAFE LOADER (Veri Yükleyici)
========================= */
async function load() {
  try {
    const res = await fetch("data.json?v=" + Date.now());
    const d = await res.json();

    if (!d?.title || !d?.text) throw new Error("invalid data");

    // Sekme başlığını domain olarak sabitliyoruz
    document.title = "götayağı.com"; 
    
    document.getElementById("title").innerText = d.title;
    document.getElementById("text").innerText = d.text;
    document.getElementById("meta").innerText = `${d.topic.toUpperCase()} • ${d.date}`;

  } catch (e) {
    document.getElementById("text").innerText = "Yeni bir nükte bekleniyor...";
  }
}

load();
</script>

</body>
</html>
