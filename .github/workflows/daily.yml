name: Daily AI Writer

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ai-writer
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      LANG: tr_TR.UTF-8
      LC_ALL: tr_TR.UTF-8
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repo çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bağımlılık kur
        run: npm install

      - name: AI yazı üret
        run: node generate.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Git ayarla
        run: |
          git config user.name "ai-bot"
          git config user.email "bot@example.com"

      - name: Commit değişiklikleri
        run: |
          git add .

          git diff --cached --quiet || git commit -m "daily content update"

      - name: Push güvenli
        run: |
          git pull --rebase origin main
          git push origin main
