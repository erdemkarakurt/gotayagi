name: Daily AI Writer

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ai-writer
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bağımlılık kur
        run: npm install

      - name: AI yazı üret
        run: node generate.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit + Safe Push
        run: |
          git config user.name "ai-bot"
          git config user.email "bot@example.com"

          git add data.json

          git diff --cached --quiet || git commit -m "daily content update"

          git push origin main
